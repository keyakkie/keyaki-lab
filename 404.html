<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    const newBase = "https://hitu-keylab.github.io/keyaki-lab/";
    const target =
      newBase +
      location.pathname.replace(/^\/keyakkie/, "") +
      location.search +
      location.hash;

    location.replace(target);
  </script>
</head>
<body>
  <p>移動しています</p>
</body>
</html>
